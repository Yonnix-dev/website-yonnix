<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status — yonn_ix</title>
<meta name="description" content="Status en temps réel des services de yonn_ix">
<meta property="og:title" content="Status — yonn_ix services">
<meta property="og:description" content="État en temps réel des services yonn_ix.">
<meta property="og:image" content="https://website-yonnix.vercel.app/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--surface:#0c0c0c;--border:rgba(251,191,36,.12);
  --text:#e8e4d4;--muted:rgba(232,228,212,.5);
  --accent:#fbbf24;--success:#22c55e;--warning:#eab308;--error:#ef4444;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora-orb{position:absolute;border-radius:50%;filter:blur(130px);opacity:.15;animation:drift 20s ease-in-out infinite;will-change:transform}
.aurora-orb:nth-child(1){width:70vw;height:70vw;top:-20%;left:-20%;background:radial-gradient(circle,#fbbf24 0%,transparent 70%);animation-duration:24s}
.aurora-orb:nth-child(2){width:50vw;height:50vw;bottom:-10%;right:-10%;background:radial-gradient(circle,#f59e0b 0%,transparent 70%);animation-duration:18s;animation-delay:-8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4vw,3vh) scale(1.05)}66%{transform:translate(-2vw,6vh) scale(.97)}}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(251,191,36,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(251,191,36,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.wrap{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:60px 24px 100px}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:64px}
.logo{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--accent);text-decoration:none;transition:opacity .2s}
.logo:hover{opacity:.7}
.back-btn{font-size:.8rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.back-btn:hover{color:var(--accent)}
.hero-label{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.3em;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-label::before{content:'';display:block;width:32px;height:1px;background:var(--accent)}
.hero-title{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:16px;background:linear-gradient(135deg,var(--accent) 0%,#fff 60%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.overall-badge{display:inline-flex;align-items:center;gap:10px;padding:10px 22px;border-radius:100px;font-weight:600;font-size:.9rem;margin-bottom:56px;transition:all .4s var(--ease)}
.overall-badge.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);color:var(--success)}
.overall-badge.degraded{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.3);color:var(--warning)}
.overall-badge.down{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:var(--error)}
.overall-badge.maintenance{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.3);color:#93c5fd}
.overall-badge.checking{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted)}
.pulse-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ok .pulse-dot{background:var(--success);animation:pulse 2s ease-in-out infinite}
.degraded .pulse-dot{background:var(--warning);animation:pulse 2s ease-in-out infinite}
.down .pulse-dot{background:var(--error);animation:pulse 1s ease-in-out infinite}
.maintenance .pulse-dot{background:#60a5fa}
.checking .pulse-dot{background:var(--muted)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 6px transparent}}
.section-title{font-family:'Space Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.28em;color:var(--muted);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.services-list{display:flex;flex-direction:column;gap:2px;margin-bottom:48px}
.service-row{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;background:var(--surface);border:1px solid var(--border);transition:border-color .25s var(--ease),background .25s,transform .25s var(--ease);gap:12px;animation:fade-up .4s var(--ease) both}
.service-row:hover{border-color:rgba(251,191,36,.28);background:rgba(251,191,36,.018);transform:translateY(-2px)}
.service-info{display:flex;flex-direction:column;gap:5px}
.service-name{font-weight:600;font-size:.95rem}
.service-desc{font-size:.72rem;color:var(--muted);font-family:'Space Mono',monospace}
.status-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:100px;font-size:.75rem;font-weight:600;white-space:nowrap;transition:all .35s var(--ease)}
.status-pill.operational{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--success)}
.status-pill.degraded{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.25);color:var(--warning)}
.status-pill.down{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--error)}
.status-pill.maintenance{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:#93c5fd}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:48px}
.kpi-card{background:var(--surface);border:1px solid var(--border);padding:24px 20px;animation:fade-up .5s var(--ease) .15s both;transition:border-color .25s,background .25s}
.kpi-card:hover{border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.015)}
.kpi-label{font-family:'Space Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin-bottom:10px}
.kpi-value{font-size:2rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.kpi-sub{font-size:.72rem;color:var(--muted);margin-top:6px}
.footer-bar{display:flex;align-items:center;justify-content:space-between;padding-top:28px;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted);font-family:'Space Mono',monospace;flex-wrap:wrap;gap:12px}
.admin-link{font-size:.75rem;color:var(--muted);text-decoration:none;transition:color .2s}
.admin-link:hover{color:var(--accent)}
@keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.kpi-row{grid-template-columns:1fr 1fr}.kpi-row .kpi-card:last-child{grid-column:1/-1}.service-row{flex-direction:column;align-items:flex-start}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}
</style>
</head>
<body>
<div class="aurora"><div class="aurora-orb"></div><div class="aurora-orb"></div></div>
<div class="wrap">
  <div class="top-bar">
    <a href="/" class="logo">yonn_ix</a>
    <a href="/" class="back-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour
    </a>
  </div>
  <div class="hero-label">Status</div>
  <h1 class="hero-title">État des services</h1>
  <div class="overall-badge checking" id="overallBadge"><span class="pulse-dot"></span><span id="overallText">Chargement...</span></div>

  <!-- KPIs -->
  <div class="kpi-row">
    <div class="kpi-card"><div class="kpi-label">Services opérationnels</div><div class="kpi-value" id="kpiOk">—</div><div class="kpi-sub" id="kpiTotal">sur — total</div></div>
    <div class="kpi-card"><div class="kpi-label">En maintenance</div><div class="kpi-value" id="kpiMaint">—</div><div class="kpi-sub">services</div></div>
    <div class="kpi-card"><div class="kpi-label">Dernière mise à jour</div><div class="kpi-value" id="kpiTime" style="font-size:1rem">—</div><div class="kpi-sub">depuis /admin</div></div>
  </div>

  <!-- Services list -->
  <div class="section-title" style="margin-bottom:12px">Services</div>
  <div class="services-list" id="servicesList"><div style="color:var(--muted);padding:24px;font-size:.85rem">Chargement des statuts...</div></div>

  <div class="footer-bar">
    <span id="lastUpdate">Données publiées depuis le panel admin</span>
    <a href="/admin" class="admin-link">⚙️ Admin →</a>
  </div>
</div>

<script>
const STATUS_LABELS = {
  operational: '\u2705 Op\u00e9rationnel',
  degraded:    '\u26a0\ufe0f D\u00e9grad\u00e9',
  down:        '\ud83d\udd34 Interruption',
  maintenance: '\ud83d\udd27 Maintenance'
};

const DEFAULT_SERVICES = [
  { id:'site',    emoji:'\ud83c\udf10', name:'Site principal',   desc:'yonnix.fr \u2014 page d\'accueil et navigation', status:'operational' },
  { id:'api',     emoji:'\u2699\ufe0f', name:'API',              desc:'Endpoints de contact et donn\u00e9es dynamiques', status:'operational' },
  { id:'music',   emoji:'\ud83c\udfb5', name:'Musique',          desc:'Lecteur audio et streaming', status:'operational' },
  { id:'contact', emoji:'\ud83d\udcec', name:'Formulaire',       desc:'Syst\u00e8me de tickets et formulaire de contact', status:'operational' },
  { id:'cdn',     emoji:'\ud83d\udce6', name:'CDN / Assets',     desc:'Images, polices et ressources statiques', status:'operational' },
  { id:'vercel',  emoji:'\u25b2',  name:'Vercel Deploy',    desc:'D\u00e9ploiement continu et builds automatiques', status:'operational' },
];

async function loadAndRender() {
  let services = DEFAULT_SERVICES;

  try {
    const res  = await fetch('/api/status');
    const data = await res.json();
    // Redis peut renvoyer une string JSON ou un objet direct
    const parsed = typeof data === 'string' ? JSON.parse(data) : data;
    if (Array.isArray(parsed) && parsed.length) {
      services = parsed;
    }
  } catch(e) {
    console.warn('API /api/status indisponible, affichage des valeurs par d\u00e9faut.');
  }

  render(services);
}

function render(services) {
  // Services list
  const list = document.getElementById('servicesList');
  list.innerHTML = services.map((svc, i) => `
    <div class="service-row" style="animation-delay:${i * 0.06}s">
      <div class="service-info">
        <span class="service-name">${svc.emoji || ''} ${svc.name}</span>
        <span class="service-desc">${svc.desc || ''}</span>
      </div>
      <span class="status-pill ${svc.status}">
        <span class="dot"></span>${STATUS_LABELS[svc.status] || svc.status}
      </span>
    </div>
  `).join('');

  // KPIs
  const ok    = services.filter(s => s.status === 'operational').length;
  const maint = services.filter(s => s.status === 'maintenance').length;
  document.getElementById('kpiOk').textContent    = ok;
  document.getElementById('kpiMaint').textContent = maint;
  document.getElementById('kpiTotal').textContent = `sur ${services.length} total`;

  // Heure
  const now = new Date();
  document.getElementById('kpiTime').textContent    = now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('lastUpdate').textContent = 'Derni\u00e8re mise \u00e0 jour : ' + now.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

  // Global badge
  const statuses = services.map(s => s.status);
  let global = 'operational';
  if (statuses.includes('down'))             global = 'down';
  else if (statuses.includes('degraded'))    global = 'degraded';
  else if (statuses.includes('maintenance')) global = 'maintenance';

  const texts = {
    operational: '\u2705 Tous les syst\u00e8mes op\u00e9rationnels',
    degraded:    '\u26a0\ufe0f Performances d\u00e9grad\u00e9es',
    down:        '\ud83d\udd34 Interruption de service',
    maintenance: '\ud83d\udd27 Maintenance en cours'
  };
  const badge = document.getElementById('overallBadge');
  // map global -> badge class
  const badgeClass = { operational:'ok', degraded:'degraded', down:'down', maintenance:'maintenance' };
  badge.className = `overall-badge ${badgeClass[global]}`;
  document.getElementById('overallText').textContent = texts[global];
}

loadAndRender();
// Auto-refresh toutes les 30 secondes
setInterval(loadAndRender, 30000);
</script>
<script src="/speed-insights.bundle.js" defer></script>
</body>
</html>
