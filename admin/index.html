<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - yonn_ix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #000000;
            --color-surface: #0a0a0a;
            --color-border: #1a1a1a;
            --color-text: #e0e6ff;
            --color-accent: #fbbf24;
            --color-accent-dark: #f59e0b;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: var(--color-text);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(251, 191, 36, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251, 191, 36, 0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding-top: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--color-text) 0%, var(--color-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--color-text);
            opacity: 0.7;
            font-size: 0.95rem;
        }

        .login-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            display: block;
        }

        .login-section.hidden {
            display: none;
        }

        .login-section h2 {
            font-size: 1.5rem;
            margin-bottom: 24px;
            color: var(--color-text);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--color-text);
            opacity: 0.8;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-dark) 100%);
            color: var(--color-bg);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(251, 191, 36, 0.2);
        }

        .error {
            color: #ff5459;
            font-size: 0.9rem;
            margin-top: 12px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .stats-section {
            display: none;
        }

        .stats-section.show {
            display: block;
        }

        .stats-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .stats-header h2 {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--color-text);
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-accent);
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-accent);
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: var(--color-accent);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>yonn_ix</h1>
            <p>Admin Panel</p>
        </header>

        <div class="login-section" id="loginSection">
            <h2>Accès Admin</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Entrez le mot de passe" required autocomplete="off">
                </div>
                <button type="submit" class="btn">Se connecter</button>
                <div class="error" id="errorMsg">Mot de passe incorrect</div>
            </form>
            <div class="back-link">
                <a href="/">← Retour au site</a>
            </div>
        </div>

        <div class="stats-section" id="statsSection">
            <button class="back-btn" onclick="logout()">← Déconnexion</button>
            <div class="stats-header">
                <h2>Statistiques</h2>
                <p>Données Vercel Web Analytics</p>
            </div>
            <div id="statsContainer">
                <div style="text-align: center; padding: 40px;">
                    <p>Stats en cours de chargement...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "135975";
        const VERCEL_TOKEN = "lmv6x0dFt1EegVGw87hFPocn";
        const PROJECT_ID = "prj_OWVGeh9fxLPNMz0MOkleMaUsfj7A";

        window.addEventListener('load', () => {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (isLoggedIn === 'true') {
                showStats();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const pwd = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (pwd === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                errorMsg.classList.remove('show');
                showStats();
            } else {
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
            }
        });

        function showStats() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('statsSection').classList.add('show');
            fetchStats();
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('statsSection').classList.remove('show');
            document.getElementById('password').value = '';
        }

        async function fetchStats() {
            try {
                const response = await fetch(
                    `https://api.vercel.com/v1/analytics/timeseries?projectId=${PROJECT_ID}&limit=30`,
                    {
                        headers: {
                            'Authorization': `Bearer ${VERCEL_TOKEN}`,
                            'Content-Type': 'application/json'
                        }
                    }
                );

                if (!response.ok) {
                    throw new Error(`Erreur: ${response.status}`);
                }

                const data = await response.json();
                const timeseries = data.timeseries || [];
                let totalVisitors = 0;
                let totalPageViews = 0;

                timeseries.forEach(point => {
                    totalVisitors += point.visitors || 0;
                    totalPageViews += point.pageviews || 0;
                });

                const bounceRate = totalPageViews > 0 ? Math.round((totalVisitors / totalPageViews) * 100) : 0;

                document.getElementById('statsContainer').innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Visiteurs</div>
                            <div class="stat-value">${totalVisitors}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Pages Vues</div>
                            <div class="stat-value">${totalPageViews}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Taux de Rebond</div>
                            <div class="stat-value">${bounceRate}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Données</div>
                            <div class="stat-value">${timeseries.length} jours</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('statsContainer').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #ff5459;">
                        ⚠️ Erreur: ${error.message}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
