<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — yonn_ix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg:#000;--surface:#0c0c0c;--surface2:#111;
  --border:rgba(251,191,36,.12);
  --text:#e8e4d4;--muted:rgba(232,228,212,.5);
  --accent:#fbbf24;--accent2:#f59e0b;
  --success:#22c55e;--error:#ef4444;--warning:#eab308;
  --ease:cubic-bezier(0.16,1,0.3,1);--r:6px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(251,191,36,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(251,191,36,.04) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
}
.app{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 24px}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px 40px;animation:fade-up .5s var(--ease) both}
.login-card h1{font-family:'Space Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--accent);margin-bottom:8px}
.login-card p{color:var(--muted);font-size:.9rem;margin-bottom:36px}
label{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);font-family:'Space Mono',monospace;margin-bottom:8px}
input[type=password]{width:100%;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.95rem;transition:border-color .25s,box-shadow .25s;font-family:'Space Grotesk',sans-serif}
input[type=password]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(251,191,36,.1)}
.btn-login{margin-top:20px;width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:var(--r);font-weight:700;font-size:.95rem;letter-spacing:.05em;cursor:pointer;transition:transform .2s var(--ease),box-shadow .2s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(251,191,36,.3)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-error{margin-top:12px;padding:10px 14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--r);color:#fca5a5;font-size:.85rem;display:none}
.login-error.show{display:block}
.back-link{display:block;text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted)}
.back-link a{color:var(--accent);text-decoration:none}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 32px;border-bottom:1px solid var(--border);margin-bottom:0}
.header-logo{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--accent);letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:12px}
.btn-icon{padding:7px 14px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .2s,color .2s;font-family:'Space Mono',monospace}
.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
.btn-icon svg{transition:transform .5s var(--ease)}
.btn-icon:hover svg{transform:rotate(180deg)}
.btn-logout{padding:7px 16px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:border-color .2s,color .2s}
.btn-logout:hover{border-color:var(--error);color:var(--error)}
.last-updated{font-size:.7rem;color:var(--muted);font-family:'Space Mono',monospace}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:32px}
.tab-btn{padding:14px 24px;background:transparent;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* ── DASHBOARD ── */
#dashboard{display:none;padding-bottom:60px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px;margin-bottom:40px}
.kpi-card{background:var(--surface);border:1px solid var(--border);padding:28px 24px;transition:border-color .3s,background .3s;animation:fade-up .4s var(--ease) both}
.kpi-card:hover{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.02)}
.kpi-label{font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin-bottom:12px}
.kpi-value{font-size:2.2rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.kpi-delta{margin-top:8px;font-size:.78rem;display:flex;align-items:center;gap:4px}
.delta-up{color:var(--success)}.delta-down{color:var(--error)}.delta-flat{color:var(--muted)}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:2px;margin-bottom:40px}
@media(max-width:768px){.charts-row{grid-template-columns:1fr}}
.chart-card{background:var(--surface);border:1px solid var(--border);padding:28px;animation:fade-up .5s var(--ease) .1s both}
.chart-title{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.chart-subtitle{font-size:.75rem;color:var(--muted)}
.chart-canvas-wrap{position:relative;height:220px}
.table-card{background:var(--surface);border:1px solid var(--border);padding:28px;animation:fade-up .5s var(--ease) .2s both;margin-bottom:2px}
.table-title{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.2em;color:var(--accent);margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th{font-size:.65rem;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-weight:400}
td{padding:12px;font-size:.9rem;border-bottom:1px solid rgba(251,191,36,.05)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(251,191,36,.02)}
.page-bar-wrap{width:100%;background:rgba(255,255,255,.05);border-radius:100px;overflow:hidden;height:4px;margin-top:4px}
.page-bar{height:4px;background:var(--accent);border-radius:100px;transition:width .8s var(--ease)}
.page-views-num{font-variant-numeric:tabular-nums;color:var(--accent);font-weight:600}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:40px}
@media(max-width:640px){.info-row{grid-template-columns:1fr}}
.info-card{background:var(--surface);border:1px solid var(--border);padding:24px;animation:fade-up .5s var(--ease) .3s both}
.info-card-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin-bottom:16px;font-family:'Space Mono',monospace}
.info-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.info-item:last-child{border-bottom:none}
.info-key{font-size:.85rem;color:var(--muted)}
.info-val{font-size:.85rem;color:var(--text);font-variant-numeric:tabular-nums}

/* ── TICKETS TAB ── */
.tickets-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.tickets-search{position:relative}
.tickets-search input{padding:10px 16px 10px 38px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.85rem;font-family:'Space Grotesk',sans-serif;width:260px;transition:border-color .2s,box-shadow .2s}
.tickets-search input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(251,191,36,.1)}
.tickets-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.ticket-filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:100px;background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .2s;font-family:'Space Mono',monospace}
.filter-btn.active,.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(251,191,36,.06)}
.tickets-list{display:flex;flex-direction:column;gap:2px}
.ticket-card{background:var(--surface);border:1px solid var(--border);padding:20px 24px;cursor:pointer;transition:border-color .2s,background .2s}
.ticket-card:hover{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.015)}
.ticket-card.expanded{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.025)}
.ticket-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ticket-id{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted)}
.ticket-name{font-weight:600;font-size:.95rem}
.ticket-type{padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:600;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:var(--accent)}
.ticket-date{margin-left:auto;font-size:.75rem;color:var(--muted);font-family:'Space Mono',monospace}
.ticket-status-badge{padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:600;border:1px solid;cursor:pointer;transition:all .2s}
.ticket-status-badge.open{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.3);color:var(--warning)}
.ticket-status-badge.closed{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--success)}
.ticket-preview{font-size:.85rem;color:var(--muted);margin-top:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:600px}
.ticket-body{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.ticket-body.show{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ticket-field label{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:var(--accent);font-family:'Space Mono',monospace;display:block;margin-bottom:4px}
.ticket-field p{font-size:.9rem;color:var(--text)}
.ticket-field.full{grid-column:1/-1}
.ticket-actions{grid-column:1/-1;display:flex;gap:8px;margin-top:8px}
.btn-sm{padding:7px 16px;border-radius:var(--r);font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn-close-ticket{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);color:var(--success)}
.btn-close-ticket:hover{background:rgba(34,197,94,.15)}
.btn-reopen-ticket{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.3);color:var(--warning)}
.btn-reopen-ticket:hover{background:rgba(234,179,8,.15)}
.btn-delete-ticket{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:var(--error)}
.btn-delete-ticket:hover{background:rgba(239,68,68,.15)}
.tickets-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}
.tickets-empty svg{margin:0 auto 16px;opacity:.3}
.tickets-stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.t-stat{padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);font-size:.8rem}
.t-stat span{display:block;font-family:'Space Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:2px}
.t-stat label{color:var(--muted);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em}

/* ── STATUS TAB ── */
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;margin-bottom:32px}
.status-service-card{
  background:var(--surface);border:1px solid var(--border);padding:28px;
  animation:fade-up .4s var(--ease) both;
  transition:border-color .3s,background .3s;
}
.status-service-card:hover{border-color:rgba(251,191,36,.25);background:rgba(251,191,36,.015)}
.ssc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ssc-name{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:10px}
.ssc-emoji{font-size:1.4rem}
.ssc-current{font-family:'Space Mono',monospace;font-size:.7rem;padding:4px 12px;border-radius:100px;border:1px solid;font-weight:700}
.ssc-current.operational{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--success)}
.ssc-current.degraded{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.3);color:var(--warning)}
.ssc-current.down{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--error)}
.ssc-current.maintenance{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:#93c5fd}
.ssc-desc{font-size:.82rem;color:var(--muted);margin-bottom:20px;line-height:1.6}
.ssc-actions{display:flex;gap:6px;flex-wrap:wrap}
.status-btn{padding:6px 14px;border-radius:100px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid;transition:all .2s;font-family:'Space Mono',monospace;letter-spacing:.05em}
.status-btn.op{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.3);color:var(--success)}
.status-btn.op:hover,.status-btn.op.active-state{background:rgba(34,197,94,.2);border-color:var(--success);box-shadow:0 4px 14px rgba(34,197,94,.2)}
.status-btn.deg{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.3);color:var(--warning)}
.status-btn.deg:hover,.status-btn.deg.active-state{background:rgba(234,179,8,.2);border-color:var(--warning);box-shadow:0 4px 14px rgba(234,179,8,.2)}
.status-btn.dn{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:var(--error)}
.status-btn.dn:hover,.status-btn.dn.active-state{background:rgba(239,68,68,.2);border-color:var(--error);box-shadow:0 4px 14px rgba(239,68,68,.2)}
.status-btn.mt{background:rgba(96,165,250,.08);border-color:rgba(96,165,250,.3);color:#93c5fd}
.status-btn.mt:hover,.status-btn.mt.active-state{background:rgba(96,165,250,.2);border-color:#93c5fd;box-shadow:0 4px 14px rgba(96,165,250,.2)}
.status-global{
  background:var(--surface);border:1px solid var(--border);
  padding:32px 36px;margin-bottom:32px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
  animation:fade-up .3s var(--ease) both;
}
.sg-label{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin-bottom:8px}
.sg-status{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:12px}
.sg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.sg-dot.operational{background:var(--success);box-shadow:0 0 12px rgba(34,197,94,.6);animation:pulse-dot 2s ease-in-out infinite}
.sg-dot.degraded{background:var(--warning);box-shadow:0 0 12px rgba(234,179,8,.6);animation:pulse-dot 2s ease-in-out infinite}
.sg-dot.down{background:var(--error);box-shadow:0 0 12px rgba(239,68,68,.6);animation:pulse-dot 2s ease-in-out infinite}
.sg-dot.maintenance{background:#60a5fa;box-shadow:0 0 12px rgba(96,165,250,.6)}
.sg-link{font-size:.82rem;color:var(--muted);font-family:'Space Mono',monospace}
.sg-link a{color:var(--accent);text-decoration:none}
.sg-link a:hover{text-decoration:underline}
.status-save-btn{
  padding:12px 28px;background:var(--accent);color:#000;
  border:none;border-radius:var(--r);font-weight:700;font-size:.9rem;
  cursor:pointer;letter-spacing:.05em;
  transition:transform .2s var(--ease),box-shadow .2s;
  font-family:'Space Grotesk',
