<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHATX - IA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #000000;
            --color-surface: #0a0a0a;
            --color-border: #1a1a1a;
            --color-text: #e0e6ff;
            --color-accent: #fbbf24;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: var(--color-text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(251, 191, 36, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(251, 191, 36, 0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--color-text) 0%, var(--color-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #999;
            font-size: 1.1rem;
        }

        .chatbox-wrapper {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px;
            margin: 30px 0;
            min-height: 700px;
        }

        iframe {
            width: 100%;
            height: 700px;
            border: none;
            border-radius: 8px;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: var(--color-accent);
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .back-link a:hover {
            color: var(--color-text);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>CHATX</h1>
            <p>Ton assistant IA personnel</p>
        </header>

        <div class="chatbox-wrapper">
            <p style="text-align:center;color:#999;">En attente du chatbot...</p>
        </div>

        <div class="back-link">
            <a href="/">← Retour au site</a>
        </div>
    </div>
</body>
</html>
